name: CI

on:
  workflow_call:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - run: uv sync --group dev

      - name: Run tests with coverage threshold
        run: uv run pytest --maxfail=1 --disable-warnings --cov=app --cov-report=term --cov-fail-under=25

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - run: uv sync --group dev

      - name: Run mypy on critical modules
        run: >
          uv run mypy
          -m app.external.remnawave_api
          -m app.database.crud.subscription
          -m app.cabinet.routes.subscription_helpers
