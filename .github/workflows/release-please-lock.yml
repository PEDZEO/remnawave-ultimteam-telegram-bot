name: Release Please Lock Sync

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-uv-lock:
    if: github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Regenerate lockfile
        run: uv lock

      - name: Commit uv.lock if changed
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already up-to-date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv lockfile for release please"
          git push origin "HEAD:${{ github.head_ref }}"
